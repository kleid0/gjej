name: Store Coverage Report

# Fetches /api/admin/store-coverage?detail=1 from production and commits the
# JSON output to the `reports/store-coverage` branch (force-push, single
# file). Lets Claude read current per-product store-count data via MCP
# without needing outbound HTTP from its sandbox.
#
# Trigger: manual (workflow_dispatch). Inputs control max storeCount filter
# and result limit. CRON_SECRET must be configured as a repo secret.

on:
  workflow_dispatch:
    inputs:
      max:
        description: "Only include products with store_count <= this (blank = all)"
        required: false
        default: "1"
      limit:
        description: "Max rows to return (1–5000)"
        required: false
        default: "500"
      base_url:
        description: "Site base URL"
        required: false
        default: "https://gjej.al"

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch and commit report
    runs-on: ubuntu-latest
    steps:
      - name: Fetch store-coverage detail
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ inputs.base_url }}
          MAX: ${{ inputs.max }}
          LIMIT: ${{ inputs.limit }}
        run: |
          set -eu
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set on the repository."
            exit 1
          fi
          query="detail=1&limit=${LIMIT}"
          if [ -n "${MAX}" ]; then
            query="${query}&max=${MAX}"
          fi
          mkdir -p out

          echo "--- DNS / TLS reachability probe for apex + www ---"
          for host in "gjej.al" "www.gjej.al"; do
            echo "[${host}] dig:"
            getent hosts "${host}" || echo "  (no A record)"
            echo "[${host}] openssl s_client (5s, first cert subject/issuer):"
            ( timeout 5 openssl s_client -servername "${host}" -connect "${host}:443" </dev/null 2>/dev/null \
              | openssl x509 -noout -subject -issuer -dates 2>/dev/null ) \
              || echo "  (handshake failed or no cert)"
            echo
          done

          url="${BASE_URL}/api/admin/store-coverage?${query}"
          echo "Requesting: ${url}"
          # -L   follow redirects (apex → www, http → https)
          # -sS  silent but show errors
          # --fail-with-body  non-zero exit on 4xx/5xx, still capture body
          # --trace-time + -v → full TLS negotiation detail, including the exact SSL error
          set +e
          curl -LsS --fail-with-body -v --trace-time \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: gjej-coverage-report/1.0" \
            -D out/headers.txt \
            -o out/store-coverage.json \
            -w "HTTP_STATUS=%{http_code}\nREDIRECTS=%{num_redirects}\nFINAL_URL=%{url_effective}\n" \
            "${url}" 2> out/curl-verbose.log
          curl_exit=$?
          set -e
          echo "curl exit code: ${curl_exit}"
          if [ "${curl_exit}" -ne 0 ]; then
            echo "--- curl verbose log (last 80 lines) ---"
            tail -n 80 out/curl-verbose.log || true
          fi
          echo "--- response headers ---"
          cat out/headers.txt 2>/dev/null || echo "(no headers — TLS likely failed)"
          echo "--- response body (first 2KB) ---"
          head -c 2048 out/store-coverage.json 2>/dev/null || echo "(no body)"
          echo
          if [ "${curl_exit}" -ne 0 ]; then
            echo "::error::curl failed with exit ${curl_exit}"
            exit "${curl_exit}"
          fi
          # Pretty-print for easier diffs / MCP reads
          jq '.' out/store-coverage.json > out/store-coverage.pretty.json
          mv out/store-coverage.pretty.json out/store-coverage.json

      - name: Write metadata
        env:
          MAX: ${{ inputs.max }}
          LIMIT: ${{ inputs.limit }}
          BASE_URL: ${{ inputs.base_url }}
        run: |
          cat > out/meta.json <<EOF
          {
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "baseUrl": "${BASE_URL}",
            "max": "${MAX}",
            "limit": "${LIMIT}",
            "runId": "${{ github.run_id }}",
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Publish to reports/store-coverage branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          cd "${RUNNER_TEMP}"
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Detached orphan branch so we don't inherit main's history
          git checkout --orphan reports/store-coverage
          git rm -rf . > /dev/null 2>&1 || true
          cp "${GITHUB_WORKSPACE}/out/store-coverage.json" ./store-coverage.json
          cp "${GITHUB_WORKSPACE}/out/meta.json" ./meta.json
          cat > README.md <<'EOF'
          # Store Coverage Reports

          Generated by `.github/workflows/store-coverage-report.yml`.
          Force-pushed on each manual run — only the latest snapshot lives here.

          - `store-coverage.json` — summary + per-product list (sorted by storeCount ASC).
          - `meta.json` — when the snapshot was taken and with which filters.
          EOF
          git add store-coverage.json meta.json README.md
          git commit -m "chore(report): store-coverage snapshot"
          git push --force origin reports/store-coverage

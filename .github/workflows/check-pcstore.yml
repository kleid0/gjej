name: Check PC Store

# Calls /api/cron/check-pcstore weekly to probe pcstore.al's WooCommerce
# API and send an admin notification when it comes back up. Migrated from
# Vercel Cron (Monday 05:00 UTC) to GHA to avoid the Vercel hobby-plan
# cron-execution limit.
#
# Triggers:
#   - schedule (every Monday 05:00 UTC)
#   - workflow_dispatch (manual, with optional base_url override)
# CRON_SECRET must be configured as a repo secret.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Site base URL"
        required: false
        default: "https://gjej.vercel.app"
  schedule:
    - cron: "0 5 * * 1"

concurrency:
  group: check-pcstore
  cancel-in-progress: false

jobs:
  check:
    name: Probe pcstore.al
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/check-pcstore
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ inputs.base_url || 'https://gjej.vercel.app' }}
        run: |
          set -eu
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set on the repository."
            exit 1
          fi

          url="${BASE_URL}/api/cron/check-pcstore"
          echo "GET ${url}"

          body_file="$(mktemp)"
          http_status="$(curl -LsS \
            --max-time 45 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: gjej-check-pcstore/1.0" \
            -o "${body_file}" \
            -w "%{http_code}" \
            "${url}" || echo "000")"

          echo "HTTP ${http_status}"
          cat "${body_file}"
          echo

          if [ "${http_status}" != "200" ]; then
            echo "::error::Non-200 response (status=${http_status})"
            exit 1
          fi

          status="$(jq -r '.status // "?"' "${body_file}")"
          previous="$(jq -r '.previousStatus // "none"' "${body_file}")"
          notified="$(jq -r '.notified // false' "${body_file}")"
          echo "status=${status} previous=${previous} notified=${notified}"

name: Trends

# Calls /api/cron/trends once daily to fetch Google Trends interest scores
# for the top products and cache them on the server. Migrated from Vercel
# Cron (07:00 UTC) to GHA to avoid the Vercel hobby-plan cron-execution limit.
#
# Triggers:
#   - schedule (daily 07:00 UTC)
#   - workflow_dispatch (manual, with optional base_url override)
# CRON_SECRET must be configured as a repo secret.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Site base URL"
        required: false
        default: "https://gjej.vercel.app"
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: trends
  cancel-in-progress: false

jobs:
  trends:
    name: Fetch trends scores
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call /api/cron/trends
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ inputs.base_url || 'https://gjej.vercel.app' }}
        run: |
          set -eu
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set on the repository."
            exit 1
          fi

          url="${BASE_URL}/api/cron/trends"
          echo "GET ${url}"

          body_file="$(mktemp)"
          http_status="$(curl -LsS \
            --max-time 130 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: gjej-trends/1.0" \
            -o "${body_file}" \
            -w "%{http_code}" \
            "${url}" || echo "000")"

          echo "HTTP ${http_status}"
          cat "${body_file}"
          echo

          if [ "${http_status}" != "200" ]; then
            echo "::error::Non-200 response (status=${http_status})"
            exit 1
          fi

          total="$(jq -r '.total // "?"' "${body_file}")"
          non_zero="$(jq -r '.nonZero // "?"' "${body_file}")"
          echo "total=${total} nonZero=${non_zero}"

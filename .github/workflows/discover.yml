name: Discover Products

# Calls /api/cron/discover once daily to find new products across all
# stores and commit the updated discovered-products.json + discovery-log.json
# back to the repo. Migrated from Vercel Cron (03:00 UTC) to GHA so runs
# are not gated by the Vercel hobby-plan cron-execution limit.
#
# Triggers:
#   - schedule (daily 03:00 UTC)
#   - workflow_dispatch (manual, with optional base_url override)
# CRON_SECRET must be configured as a repo secret.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Site base URL"
        required: false
        default: "https://gjej.vercel.app"
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    name: Run discovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call /api/cron/discover
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ inputs.base_url || 'https://gjej.vercel.app' }}
        run: |
          set -eu
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is not set on the repository."
            exit 1
          fi

          url="${BASE_URL}/api/cron/discover"
          echo "GET ${url}"

          body_file="$(mktemp)"
          http_status="$(curl -LsS \
            --max-time 310 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: gjej-discover/1.0" \
            -o "${body_file}" \
            -w "%{http_code}" \
            "${url}" || echo "000")"

          echo "HTTP ${http_status}"
          cat "${body_file}"
          echo

          if [ "${http_status}" != "200" ]; then
            echo "::error::Non-200 response (status=${http_status})"
            exit 1
          fi

          discovered="$(jq -r '.discovered // "?"' "${body_file}")"
          discontinued="$(jq -r '.discontinued // "?"' "${body_file}")"
          commit_sha="$(jq -r '.commitSha // "none"' "${body_file}")"
          echo "discovered=${discovered} discontinued=${discontinued} commit=${commit_sha}"
